name: Firebase

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: VITE_API_BASE_URL= npx nx run web:build
      - run: npx nx run web:lint
      - run: npx nx run api:typecheck
      - run: npx nx run api:build

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - name: Build web for Firebase Hosting
        run: VITE_API_BASE_URL= npx nx run web:build
      - name: Deploy Hosting, Functions, and Firestore rules
        run: npx firebase-tools@13 deploy --non-interactive
