name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  nx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: VITE_API_BASE_URL= npx nx run web:build
      - run: npx nx run web:lint
      - run: npx nx run api:typecheck
      - run: npx nx run api:build

  deploy-firebase:
    runs-on: ubuntu-latest
    needs: nx
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - name: Build web for Firebase Hosting
        run: VITE_API_BASE_URL= npx nx run web:build
      - name: Build API for Cloud Functions
        run: npx nx run api:build
      - name: Deploy hosting, functions, and Firestore rules
        run: npx firebase-tools@13 deploy --only hosting,functions,firestore:rules --non-interactive

  # Static preview on GitHub Pages under previews/<slug>/ (API calls go to Firebase — Pages cannot host /api).
  github-pages-preview:
    runs-on: ubuntu-latest
    needs: nx
    if: vars.FIREBASE_HOSTING_ORIGIN != '' && (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'))
    concurrency:
      group: gh-pages-preview-${{ github.repository }}
      cancel-in-progress: false
    environment:
      name: github-pages-preview
      url: ${{ steps.pages.outputs.page_url }}
    permissions:
      contents: write
      pull-requests: write
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - name: Preview slug (PR number or sanitized branch)
        id: slug
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "safe=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            raw="${GITHUB_REF_NAME,,}"
            s=$(printf '%s' "$raw" | tr '/' '-' | tr -c 'a-z0-9-\n' '-' | tr -s '-' | sed 's/^-//;s/-$//')
            test -n "$s" || s=branch
            echo "safe=${s:0:60}" >> "$GITHUB_OUTPUT"
          fi
      - name: Vite base path and public preview URL
        id: pages
        env:
          SAFE: ${{ steps.slug.outputs.safe }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            echo "vite_base=/previews/${SAFE}/" >> "$GITHUB_OUTPUT"
            echo "page_url=https://${OWNER}.github.io/previews/${SAFE}/" >> "$GITHUB_OUTPUT"
            echo "dest_dir=previews/${SAFE}" >> "$GITHUB_OUTPUT"
          else
            echo "vite_base=/${REPO}/previews/${SAFE}/" >> "$GITHUB_OUTPUT"
            echo "page_url=https://${OWNER}.github.io/${REPO}/previews/${SAFE}/" >> "$GITHUB_OUTPUT"
            echo "dest_dir=previews/${SAFE}" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Build web for GitHub Pages
        env:
          GITHUB_PAGES_BASE: ${{ steps.pages.outputs.vite_base }}
          VITE_API_BASE_URL: ${{ vars.FIREBASE_HOSTING_ORIGIN }}
        run: npx nx run web:build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/web/dist
          destination_dir: ${{ steps.pages.outputs.dest_dir }}
          keep_files: true
      - name: Comment PR with GitHub Pages URL
        if: github.event_name == 'pull_request'
        env:
          PAGE_URL: ${{ steps.pages.outputs.page_url }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- github-pages-preview -->';
            const url = process.env.PAGE_URL;
            const body = `${marker}\n**GitHub Pages preview:** ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.user?.type === 'Bot' && c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
