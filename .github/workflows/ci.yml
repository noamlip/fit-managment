name: CI

on:
  push:
    branches: [main, master,nl/feature/trainers]
  pull_request:

jobs:
  nx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package.json
      - run: npm ci
      - run: npx nx run web:build
      - run: npx nx run web:lint
      - run: npx nx run api:typecheck
