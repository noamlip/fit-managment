name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  nx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: VITE_API_BASE_URL= npx nx run web:build
      - run: npx nx run web:lint
      - run: npx nx run api:typecheck
      - run: npx nx run api:build

  deploy-firebase:
    runs-on: ubuntu-latest
    needs: nx
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - name: Build web for Firebase Hosting
        run: VITE_API_BASE_URL= npx nx run web:build
      - name: Build API for Cloud Functions
        run: npx nx run api:build
      - name: Deploy hosting, functions, and Firestore rules
        run: npx firebase-tools@13 deploy --only hosting,functions,firestore:rules --non-interactive

  hosting-preview:
    runs-on: ubuntu-latest
    needs: nx
    if: github.event_name == 'pull_request'
    environment:
      name: firebase-preview
      url: ${{ steps.firebase_preview.outputs.details_url }}
    permissions:
      contents: read
      pull-requests: write
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Build web for preview (same-origin /api rewrites)
        run: VITE_API_BASE_URL= npx nx run web:build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        id: firebase_preview
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: pr-${{ github.event.pull_request.number }}
          expires: 30d

  # Preview channel per branch push (non-main). Shows under GitHub Environments → firebase-preview.
  hosting-preview-branch:
    runs-on: ubuntu-latest
    needs: nx
    if: github.event_name == 'push'
    environment:
      name: firebase-preview
      url: ${{ steps.firebase_preview.outputs.details_url }}
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Sanitize branch name for Firebase channel id
        id: channel
        run: |
          raw="${GITHUB_REF_NAME,,}"
          safe=$(printf '%s' "$raw" | tr '/' '-' | tr -c 'a-z0-9-\n' '-' | tr -s '-' | sed 's/^-//;s/-$//')
          test -n "$safe" || safe=branch
          c="branch-${safe}"
          c="${c:0:63}"
          echo "channel_id=$c" >> "$GITHUB_OUTPUT"
      - name: Build web for preview (same-origin /api rewrites)
        run: VITE_API_BASE_URL= npx nx run web:build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        id: firebase_preview
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: ${{ steps.channel.outputs.channel_id }}
          expires: 30d
